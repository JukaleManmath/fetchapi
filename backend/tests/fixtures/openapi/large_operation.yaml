openapi: "3.0.3"
info:
  title: Large Operation API
  description: >
    Tests chunking of large operations. The single search operation has many
    query parameters (more than 8), a complex nested request body schema, and
    multiple response schemas. The chunker must produce an overview chunk plus
    separate request/response schema chunks rather than a single oversized chunk.
  version: "1.0.0"
paths:
  /v1/products/search:
    post:
      summary: Search and filter products
      description: >
        Performs a full-text and faceted search over the product catalog.
        Supports filtering by many attributes, sorting, pagination, and
        response field projection. This operation is intentionally wide to
        test that the chunker correctly splits large operations into an
        overview chunk plus schema chunks.
      operationId: searchProducts
      parameters:
        - name: X-Request-ID
          in: header
          required: false
          description: Caller-supplied idempotency key for request tracing.
          schema:
            type: string
            format: uuid
        - name: X-Tenant-ID
          in: header
          required: true
          description: >
            Tenant identifier scoping the search to a specific catalog partition.
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for cursor-based pagination (1-indexed).
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results to return per page.
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by.
          schema:
            type: string
            enum:
              - relevance
              - price_asc
              - price_desc
              - name_asc
              - name_desc
              - created_at_desc
              - rating_desc
            default: relevance
        - name: currency
          in: query
          required: false
          description: ISO 4217 currency code used to format price facets in the response.
          schema:
            type: string
            default: USD
            minLength: 3
            maxLength: 3
        - name: locale
          in: query
          required: false
          description: IETF BCP 47 language tag used to localize display names and descriptions.
          schema:
            type: string
            default: en-US
            example: en-US
        - name: include_out_of_stock
          in: query
          required: false
          description: Whether to include products that are currently out of stock.
          schema:
            type: boolean
            default: false
        - name: fields
          in: query
          required: false
          description: >
            Comma-separated list of fields to include in the response. When
            omitted, all fields are returned. Use this to reduce payload size
            when only a subset of fields is needed.
          schema:
            type: string
            example: "id,name,price,images"
        - name: expand
          in: query
          required: false
          description: >
            Comma-separated list of nested objects to expand inline.
            Supported values: `category`, `variants`, `reviews`.
          schema:
            type: string
            example: "category,variants"
      requestBody:
        required: true
        description: >
          Search query and filter specification. The body allows expressing
          complex filter trees that would be unwieldy as query parameters.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductSearchRequest"
            example:
              query: "wireless mechanical keyboard"
              filters:
                category_ids:
                  - "cat_electronics"
                  - "cat_peripherals"
                price_range:
                  min: 2000
                  max: 20000
                brand_ids:
                  - "brand_logitech"
                  - "brand_keychron"
                in_stock_only: true
                rating_min: 4.0
                attributes:
                  - name: connectivity
                    values:
                      - bluetooth
                      - usb-c
              facets:
                - brand
                - price_range
                - rating
              highlight:
                enabled: true
                fields:
                  - name
                  - description
      responses:
        "200":
          description: Search completed successfully. Returns matching products and facets.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductSearchResponse"
        "400":
          description: Invalid request — query syntax error or invalid filter field.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchError"
        "401":
          description: Authentication required. The X-Tenant-ID header is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchError"
        "422":
          description: Unprocessable entity. Filter values failed validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchError"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              description: Number of seconds to wait before retrying.
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchError"
components:
  schemas:
    ProductSearchRequest:
      type: object
      description: Full-text query and filter specification for a product search.
      properties:
        query:
          type: string
          description: Free-text search query. Supports quoted phrases and minus exclusions.
          example: "wireless mechanical keyboard"
          maxLength: 500
        filters:
          $ref: "#/components/schemas/ProductFilters"
        facets:
          type: array
          description: >
            List of facet names to compute and return alongside results.
            Supported facets: `brand`, `category`, `price_range`, `rating`,
            `attributes`.
          items:
            type: string
          example:
            - brand
            - price_range
        highlight:
          $ref: "#/components/schemas/HighlightOptions"
    ProductFilters:
      type: object
      description: Structured filter criteria for narrowing product search results.
      properties:
        category_ids:
          type: array
          description: Restrict results to products in any of these category IDs.
          items:
            type: string
          example:
            - cat_electronics
        price_range:
          $ref: "#/components/schemas/PriceRange"
        brand_ids:
          type: array
          description: Restrict results to products from any of these brand IDs.
          items:
            type: string
        in_stock_only:
          type: boolean
          description: When true, exclude out-of-stock products even if `include_out_of_stock` query param is set.
          default: false
        rating_min:
          type: number
          format: float
          description: Minimum average customer rating (1.0–5.0 inclusive).
          minimum: 1.0
          maximum: 5.0
          example: 4.0
        attributes:
          type: array
          description: Attribute key-value filters for faceted search.
          items:
            $ref: "#/components/schemas/AttributeFilter"
    PriceRange:
      type: object
      description: Inclusive price range filter in the smallest currency unit.
      properties:
        min:
          type: integer
          description: Minimum price in the smallest currency unit (e.g. cents).
          example: 2000
        max:
          type: integer
          description: Maximum price in the smallest currency unit.
          example: 20000
    AttributeFilter:
      type: object
      description: A facet filter on a named product attribute.
      required:
        - name
        - values
      properties:
        name:
          type: string
          description: The attribute name to filter on (e.g. `connectivity`, `color`).
          example: connectivity
        values:
          type: array
          description: One or more acceptable values for the attribute.
          items:
            type: string
          minItems: 1
          example:
            - bluetooth
            - usb-c
    HighlightOptions:
      type: object
      description: Configuration for query-term highlighting in search results.
      properties:
        enabled:
          type: boolean
          description: Whether to apply highlighting to search results.
          default: false
        fields:
          type: array
          description: List of field names to include highlights for.
          items:
            type: string
          example:
            - name
            - description
        fragment_size:
          type: integer
          description: Maximum character length of each highlight fragment.
          default: 150
          minimum: 50
          maximum: 500
    ProductSearchResponse:
      type: object
      description: Search results including matched products, facets, and pagination metadata.
      required:
        - data
        - total
        - page
        - per_page
      properties:
        data:
          type: array
          description: List of matching product summaries for the current page.
          items:
            $ref: "#/components/schemas/ProductSummary"
        total:
          type: integer
          description: Total number of products matching the search query and filters.
          example: 253
        page:
          type: integer
          description: Current page number.
          example: 1
        per_page:
          type: integer
          description: Number of results per page.
          example: 20
        facets:
          type: object
          description: Computed facet aggregations keyed by facet name.
          additionalProperties:
            $ref: "#/components/schemas/FacetResult"
        query_id:
          type: string
          format: uuid
          description: Server-assigned identifier for this search execution. Use for debugging.
    ProductSummary:
      type: object
      description: Lightweight product representation returned in search results.
      required:
        - id
        - name
        - price
        - currency
      properties:
        id:
          type: string
          description: Unique product identifier.
          example: prod_wkb_keychron_k2
        name:
          type: string
          description: Product display name.
          example: Keychron K2 Wireless Mechanical Keyboard
        description_snippet:
          type: string
          description: Short excerpt from the product description, possibly with highlight markers.
          example: "Compact 75% layout with <em>wireless</em> Bluetooth 5.1 and USB-C connectivity."
        price:
          type: integer
          description: Product price in the smallest currency unit.
          example: 8999
        currency:
          type: string
          description: ISO 4217 currency code.
          example: USD
        image_url:
          type: string
          format: uri
          description: URL to the primary product image.
        rating:
          type: number
          format: float
          description: Average customer rating (1.0–5.0).
          example: 4.6
        review_count:
          type: integer
          description: Total number of customer reviews.
          example: 312
        in_stock:
          type: boolean
          description: Whether the product is currently in stock.
          example: true
    FacetResult:
      type: object
      description: Aggregated facet bucket counts for a single facet dimension.
      required:
        - buckets
      properties:
        buckets:
          type: array
          description: Individual value buckets with document counts.
          items:
            $ref: "#/components/schemas/FacetBucket"
    FacetBucket:
      type: object
      description: A single value bucket in a facet.
      required:
        - value
        - count
      properties:
        value:
          type: string
          description: The facet value label.
          example: Keychron
        count:
          type: integer
          description: Number of matching documents with this facet value.
          example: 47
        selected:
          type: boolean
          description: Whether this bucket is currently applied as a filter.
          default: false
    SearchError:
      type: object
      description: Error response for failed search requests.
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine-readable error code.
          example: INVALID_FILTER
        message:
          type: string
          description: Human-readable description of the error.
          example: "Price range 'min' must not exceed 'max'."
        field:
          type: string
          description: The specific request field that caused the error, if applicable.
          example: filters.price_range.min
