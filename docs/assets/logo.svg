<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4338CA"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4338CA" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="200" height="200" rx="36" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Subtle inner highlight -->
  <rect x="1" y="1" width="198" height="198" rx="35" fill="none" stroke="white" stroke-width="1" opacity="0.08"/>
  <rect width="200" height="100" rx="35" fill="url(#glow)"/>

  <!-- Three API node dots (top) -->
  <circle cx="68" cy="64" r="7" fill="white" opacity="0.35"/>
  <circle cx="100" cy="60" r="7" fill="white" opacity="0.55"/>
  <circle cx="132" cy="64" r="7" fill="white" opacity="0.35"/>

  <!-- Connecting line between dots -->
  <line x1="75" y1="64" x2="93" y2="61" stroke="white" stroke-width="2" opacity="0.25" stroke-linecap="round"/>
  <line x1="107" y1="61" x2="125" y2="64" stroke="white" stroke-width="2" opacity="0.25" stroke-linecap="round"/>

  <!-- Vertical drop lines from dots to main arrow -->
  <line x1="68" y1="71" x2="68" y2="96" stroke="white" stroke-width="2" opacity="0.2" stroke-linecap="round"/>
  <line x1="100" y1="67" x2="100" y2="96" stroke="white" stroke-width="2.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="132" y1="71" x2="132" y2="96" stroke="white" stroke-width="2" opacity="0.2" stroke-linecap="round"/>

  <!-- Main fetch arrow — horizontal bar -->
  <rect x="44" y="96" width="88" height="10" rx="5" fill="white"/>

  <!-- Arrow head -->
  <polyline
    points="118,82 148,101 118,120"
    fill="none"
    stroke="white"
    stroke-width="10"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Left bracket -->
  <path d="M44 82 L34 82 L34 120 L44 120" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- Bottom label: "API" small text -->
  <text x="100" y="155" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="18" font-weight="700" letter-spacing="6" fill="white" opacity="0.6">API</text>

  <!-- Subtle bottom line above text -->
  <line x1="58" y1="141" x2="142" y2="141" stroke="white" stroke-width="1" opacity="0.15"/>
</svg>
